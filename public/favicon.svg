<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- TMK monogram: stylized "t" with sun above-left -->
  <defs>
    <linearGradient id="tBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e5bb8"/>
      <stop offset="100%" stop-color="#0d3f8e"/>
    </linearGradient>
    <radialGradient id="sunGold" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffe88a"/>
      <stop offset="60%" stop-color="#f5c518"/>
      <stop offset="100%" stop-color="#c48f00"/>
    </radialGradient>
  </defs>

  <!-- "t" body with curved bottom-right hook -->
  <path fill="url(#tBlue)" d="
    M 26 38
    L 70 38
    Q 73 38 73 41
    L 73 47
    Q 73 50 70 50
    L 56 50
    L 56 75
    Q 56 82 63 82
    L 72 82
    Q 76 82 76 78
    L 76 74
    Q 76 71 73 71
    L 67 71
    Q 64 71 64 68
    L 64 50
    L 42 50
    Q 39 50 39 47
    L 39 41
    Q 39 38 42 38
    Z
  "/>

  <!-- Tall vertical stem -->
  <rect x="42" y="22" width="14" height="62" rx="2" fill="url(#tBlue)"/>

  <!-- Horizontal crossbar -->
  <rect x="26" y="38" width="44" height="12" rx="2" fill="url(#tBlue)"/>

  <!-- Bottom hook curve -->
  <path fill="url(#tBlue)" d="
    M 56 65
    L 56 78
    Q 56 86 64 86
    L 75 86
    Q 80 86 80 81
    L 80 75
    Q 80 71 75 71
    L 67 71
    Q 64 71 64 68
    L 64 65
    Z
  "/>

  <!-- Sun circle above-left of the t -->
  <circle cx="29" cy="22" r="11" fill="url(#sunGold)"/>
</svg>
